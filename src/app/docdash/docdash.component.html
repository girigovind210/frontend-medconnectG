<nav class="navbar navbar-expand-lg bg-dark px-3">
  <a class="navbar-brand text-white" href="#">MedConnect</a>

  <div class="ms-auto">
    <button class="btn btn-danger" (click)="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <h2 class="text-center mb-3">Dashboard</h2>

  <marquee class="text-muted mb-3">
    Click "Add Patient" to add a new patient.
  </marquee>

  <!-- 🔍 SEARCH -->
  <div class="mb-3">
    <input 
      type="text" 
      [(ngModel)]="searchQuery" 
      (input)="searchPatients()" 
      placeholder="Search by name / phone / ID"
      class="form-control"
    />
  </div>

  <!-- ➕ ADD PATIENT -->
  <div class="d-flex justify-content-end mb-3">
    <a class="btn btn-success" routerLink="/create-patient">
      Add Patient
    </a>
  </div>

  <!-- 🔄 LOADING -->
  <div *ngIf="loading" class="text-center text-secondary mb-3">
    Loading patients...
  </div>

  <!-- 📋 TABLE -->
  <table class="table table-striped table-bordered">

    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Blood</th>
        <th>Urgency</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let patient of filteredPatients">
        <td>{{ patient.id }}</td>
        <td>{{ patient.name }}</td>
        <td>{{ patient.age }}</td>
        <td>{{ patient.blood }}</td>
        <td>{{ patient.urgency }}</td>

        <td>
          <button class="btn btn-info btn-sm me-1"
                  (click)="update(patient.id)">Update</button>

          <button class="btn btn-danger btn-sm me-1"
                  (click)="delete(patient.id)">Delete</button>

          <button class="btn btn-success btn-sm me-1"
                  (click)="view(patient.id)">View</button>

          <button class="btn btn-primary btn-sm"
                  (click)="assignMedicine(patient.id)">
            Assign
          </button>
        </td>
      </tr>

      <!-- ❌ NO DATA -->
      <tr *ngIf="filteredPatients.length === 0">
        <td colspan="6" class="text-center">
          No patients found
        </td>
      </tr>

    </tbody>

  </table>

</div>
