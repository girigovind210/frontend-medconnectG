<div class="container">
    <h2 class="text-center">Add New Patient</h2>
    
   <form (ngSubmit)="onSubmit()" #patientForm="ngForm">

  <div class="form-group">
    <label>Name</label>
    <input type="text" name="name" class="form-control"
           [(ngModel)]="patient.name" required>
  </div>

  <div class="form-group">
    <label>Age</label>
    <input type="number" name="age" class="form-control"
           [(ngModel)]="patient.age" required>
  </div>

  <div class="form-group">
    <label>Blood</label>
    <input type="text" name="blood" class="form-control"
           [(ngModel)]="patient.blood" required>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="number" name="phoneNumber" class="form-control"
           [(ngModel)]="patient.phoneNumber" required>
  </div>

  <div class="form-group">
    <label>Dose</label>
    <input type="text" name="dose" class="form-control"
           [(ngModel)]="patient.dose">
  </div>

  <div class="form-group">
    <label>Fees</label>
    <input type="number" name="fees" class="form-control"
           [(ngModel)]="patient.fees">
  </div>

  <div class="form-group">
    <label>Urgency</label>
    <input type="text" name="urgency" class="form-control"
           [(ngModel)]="patient.urgency">
  </div>

  <button type="submit" class="btn btn-success mt-2">
    Submit
  </button>

</form>
</div>
